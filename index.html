<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT Image Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div id="userInfo" class="user-info"></div>
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h1>晴天会的 Image Generator</h1>
            </div>
            <p class="subtitle">使用 GPT-Image-2 生成高质量图片</p>
        </header>

        <main class="main">
            <div class="input-section">
                <div class="prompt-container">
                    <label for="prompt" class="prompt-label">描述你想要生成的图片</label>
                    <textarea
                        id="prompt"
                        class="prompt-input"
                        placeholder="例如：一只橘猫坐在窗边看雨，室内暖色台灯，窗外冷色霓虹倒影，电影感构图，浅景深，高细节，真实摄影风格"
                        rows="4"
                    ></textarea>
                </div>

                <div class="options-section">
                    <div class="option-group">
                        <label class="option-label">图片尺寸</label>
                        <div class="size-options">
                            <button class="size-btn active" data-size="1024x1024">1024×1024</button>
                            <button class="size-btn" data-size="1024x1792">1024×1792</button>
                            <button class="size-btn" data-size="1792x1024">1792×1024</button>
                        </div>
                    </div>

                    <div class="option-group">
                        <label class="option-label">生成数量</label>
                        <div class="count-options">
                            <button class="count-btn active" data-count="1">1 张</button>
                            <!-- <button class="count-btn" data-count="2">2 张</button>
                            <button class="count-btn" data-count="4">4 张</button> -->
                        </div>
                    </div>
                </div>

                <button id="generateBtn" class="generate-btn">
                    <span class="btn-text">生成图片</span>
                    <span class="btn-loading" style="display: none;">
                        <svg class="spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 18V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M4.93 4.93L7.76 7.76" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M16.24 16.24L19.07 19.07" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12H6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M18 12H22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M4.93 19.07L7.76 16.24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M16.24 7.76L19.07 4.93" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        生成中...
                    </span>
                </button>
            </div>

            <div class="result-section">
                <div id="gallery" class="gallery">
                    <div class="placeholder">
                        <div class="placeholder-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" stroke-width="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5" stroke="currentColor" stroke-width="2"/>
                                <polyline points="21,15 16,10 5,21" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </div>
                        <p>生成的图片将显示在这里</p>
                    </div>
                </div>
            </div>
        </main>

        <section class="history-section">
            <div class="history-header">
                <h2>生成历史</h2>
                <div id="historySortControls" class="history-sort-controls">
                    <button class="history-sort-btn active" data-sort="time">按时间</button>
                    <button class="history-sort-btn" data-sort="likes">按点赞</button>
                </div>
            </div>
            <div id="historyGallery" class="history-gallery">
                <div class="history-placeholder">
                    <div class="placeholder-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 8V12L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <p>生成历史将显示在这里</p>
                </div>
            </div>
            <div id="historyPagination" class="history-pagination"></div>
        </section>

        <footer class="footer">
            <p>Powered by GPT-Image-2 API · Built with ❤️</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
